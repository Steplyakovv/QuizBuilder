name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    # Only needed by the e2e step at the end, but service containers start with the job
    # regardless of step order, so declaring it up front costs nothing.
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: quizbuilder
          POSTGRES_PASSWORD: quizbuilder
          POSTGRES_DB: quizbuilder
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install frontend dependencies
        run: npm ci

      # Fast, backend-independent checks first so they fail quickly rather than waiting on
      # the backend/e2e steps below.
      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Backend unit tests
        working-directory: server
        run: dotnet test

      # appsettings.json's connection string (quizbuilder/quizbuilder@localhost:5432) already
      # matches the postgres service above, so no override is needed. dotnet run applies
      # migrations and seeds the admin user on startup (see CLAUDE.md).
      - name: Start backend
        working-directory: server/QuizBuilder.Api
        run: nohup dotnet run --launch-profile http > ../../backend.log 2>&1 &

      - name: Wait for backend
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5131/api/auth/me > /dev/null; then
              echo "Backend is up"
              exit 0
            fi
            sleep 2
          done
          echo "Backend did not become ready in time"
          cat backend.log
          exit 1

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run e2e tests
        run: npx playwright test

      - name: Upload playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload backend log
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: backend-log
          path: backend.log
          retention-days: 7
