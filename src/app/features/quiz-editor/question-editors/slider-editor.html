<div class="slider-editor">
  <mat-form-field appearance="outline" class="number-range-field">
    <mat-label>{{ minLabel() }}</mat-label>
    <input
      matInput
      type="number"
      [value]="question().min"
      (blur)="onMinChange($any($event.target).value)"
    />
  </mat-form-field>

  <mat-form-field appearance="outline" class="number-range-field">
    <mat-label>{{ maxLabel() }}</mat-label>
    <input
      matInput
      type="number"
      [value]="question().max"
      (blur)="onMaxChange($any($event.target).value)"
    />
  </mat-form-field>

  <mat-form-field appearance="outline" class="number-range-field">
    <mat-label>{{ stepLabel() }}</mat-label>
    <input
      matInput
      type="number"
      [value]="question().step"
      (blur)="onStepChange($any($event.target).value)"
    />
  </mat-form-field>
</div>
