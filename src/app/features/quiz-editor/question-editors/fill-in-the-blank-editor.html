<div class="fill-in-the-blank-editor">
  <mat-form-field appearance="outline" class="template-field">
    <mat-label>{{ templateLabel() }}</mat-label>
    <textarea
      matInput
      [value]="question().template"
      (blur)="onTemplateChange($any($event.target).value)"
    ></textarea>
  </mat-form-field>

  @if (graded() && blankCount() > 0) {
    <p class="blank-answers-label">{{ correctAnswersLabel() }}</p>
    <div class="blank-answer-fields">
      @for (index of blankIndexes(); track index) {
        <mat-form-field appearance="outline" class="blank-answer-field">
          <mat-label>{{ blankLabel(index) }}</mat-label>
          <input
            matInput
            [value]="correctAnswer(index)"
            (blur)="onCorrectAnswerChange(index, $any($event.target).value)"
          />
        </mat-form-field>
      }
    </div>
  }
</div>
