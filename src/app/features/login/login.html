<div class="login">
  <a routerLink="/" class="back-link">{{ backToListLabel() }}</a>

  <h1>{{ titleLabel() }}</h1>
  <p class="hint">{{ hintLabel() }}</p>

  <form class="login-form" (submit)="submit(); $event.preventDefault()">
    <mat-form-field appearance="outline">
      <mat-label>{{ usernameLabel() }}</mat-label>
      <input matInput [value]="username()" (input)="username.set($any($event.target).value)" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>{{ passwordLabel() }}</mat-label>
      <input
        matInput
        type="password"
        [value]="password()"
        (input)="password.set($any($event.target).value)"
      />
    </mat-form-field>

    @if (error()) {
      <p class="login-error">{{ error() }}</p>
    }

    <button mat-flat-button color="primary" type="submit">{{ submitLabel() }}</button>
  </form>
</div>
