<div
  cdkDropList
  class="option-list"
  [cdkDropListDisabled]="!reorderable()"
  (cdkDropListDropped)="drop($event)"
>
  @for (option of options(); track option.id) {
    <div cdkDrag [cdkDragDisabled]="!reorderable()" class="option-row">
      @if (reorderable()) {
        <span cdkDragHandle class="drag-handle" aria-label="Перетащить для изменения порядка">
          <mat-icon>drag_indicator</mat-icon>
        </span>
      }
      @if (showCorrectMarking()) {
        <button
          mat-icon-button
          type="button"
          [attr.aria-pressed]="isCorrect(option.id)"
          [attr.aria-label]="isCorrect(option.id) ? 'Правильный ответ' : 'Отметить как правильный'"
          (click)="toggleCorrect(option.id)"
        >
          <mat-icon>{{ isCorrect(option.id) ? 'star' : 'star_border' }}</mat-icon>
        </button>
      }
      <mat-form-field appearance="outline" class="option-label">
        <input
          matInput
          [value]="option.label"
          (blur)="updateLabel(option.id, $any($event.target).value)"
          placeholder="Текст варианта"
        />
      </mat-form-field>
      @if (showImageUrl()) {
        @if (option.imageUrl) {
          <img class="option-image-preview" [src]="option.imageUrl" alt="" />
        }
        <mat-form-field appearance="outline" class="option-image-url">
          <input
            matInput
            [value]="option.imageUrl ?? ''"
            (blur)="updateImageUrl(option.id, $any($event.target).value)"
            placeholder="URL картинки"
          />
        </mat-form-field>
        <button
          mat-icon-button
          type="button"
          (click)="fileInput.click()"
          aria-label="Загрузить картинку с диска"
        >
          <mat-icon>upload</mat-icon>
        </button>
        <input
          #fileInput
          type="file"
          accept="image/*"
          hidden
          (change)="
            onFileSelected(option.id, $any($event.target).files); $any($event.target).value = ''
          "
        />
      }
      <button
        mat-icon-button
        type="button"
        (click)="removeOption(option.id)"
        aria-label="Удалить вариант"
      >
        <mat-icon>close</mat-icon>
      </button>
    </div>
  }
  <button mat-stroked-button type="button" (click)="addOption()">
    <mat-icon>add</mat-icon>
    Добавить вариант
  </button>
</div>
