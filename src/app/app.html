<div class="app-shell-bar">
  <button
    mat-icon-button
    type="button"
    (click)="toggleTheme()"
    [attr.aria-label]="theme() === 'dark' ? 'Включить светлую тему' : 'Включить тёмную тему'"
    [attr.title]="theme() === 'dark' ? 'Включить светлую тему' : 'Включить тёмную тему'"
  >
    <mat-icon>{{ theme() === 'dark' ? 'light_mode' : 'dark_mode' }}</mat-icon>
  </button>
</div>

<router-outlet />
